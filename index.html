<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Mundial 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🏆 Nuestra Liga Fantasy - Mundial</h1>
        <nav>
            <a href="#clasificacion">Clasificación</a>
            <a href="#torneo">Fase Final</a>
            <a href="#premios">Premios</a>
        </nav>
    </header>

    <main>
        <section id="clasificacion">
            <h2>Clasificación de la Liguilla</h2>
            <table id="tabla-clasificacion">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Mánager / Equipo</th>
                        <th>Capitán Actual</th>
                        <th>Puntos Totales</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                    <tr><td colspan="4" style="text-align:center;">Cargando datos desde Google Drive...</td></tr>
                </tbody>
            </table>
        </section>

        <section id="torneo">
            <h2>Cuadro del Torneo (Top 8)</h2>
            <div class="bracket" id="contenedor-torneo">
                </div>
        </section>

        <section id="premios">
            <h2>Premios Especiales</h2>
            <div class="premios-grid" id="contenedor-premios">
                <p><em>Los premios se definirán al finalizar la fase de grupos.</em></p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
