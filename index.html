<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Mundial 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="logo.png" alt="Mundial 2026" class="logo-oficial" onerror="this.style.display='none'">
        <h1>Liga Fantasy Mundial</h1>
        <nav>
            <a href="#clasificacion">Liguilla</a>
            <a href="#torneo">Fase Final</a>
            <a href="#premios">Premios y Podio</a>
        </nav>
    </header>

    <main>
        <section id="clasificacion">
            <h2>Clasificación Final (Fase de Grupos)</h2>
            <table id="tabla-clasificacion">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Mánager / Equipo</th>
                        <th>Puntos Liguilla</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                    <tr><td colspan="3" style="text-align:center;">Cargando base de datos desde Google Sheets...</td></tr>
                </tbody>
            </table>
        </section>

        <section id="torneo">
            <h2>Cuadro del Torneo</h2>
            <div class="bracket" id="contenedor-torneo">
                </div>
        </section>

        <section id="premios">
            <h2>Palmarés y Podio Final</h2>
            
            <div class="podio-container" id="podio-final">
                </div>
            
            <div class="premios-grid" id="contenedor-premios">
                </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
